name: rust
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rust-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - name: dependency guards (spec §4 rules)
        run: |
          ! (cargo tree -p sheet-fn --edges normal | grep -E 'sheet-(calc|parser|xlsx|lower|js)')
          ! (cargo tree -p sheet-js --target wasm32-unknown-unknown | grep -E 'sheet-conformance|proptest')
      - uses: EmbarkStudios/cargo-deny-action@v2

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: nextest (junit; red results still publish)
        run: cargo nextest run --workspace --profile ci || true
      - name: coverage gate (the §12.2 verification invariant)
        run: cargo run -p sheet-conformance --bin coverage-gate
      - uses: paged-media/state/actions/publish-results@main
        if: ${{ always() }}
        with:
          source: plugin-sheets
          suite: nextest
          format: nextest-junit
          path: target/nextest/ci/junit.xml
          map: "true"
          dispatch-token: ${{ secrets.STATE_DISPATCH_TOKEN }}

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: install pinned wasm-bindgen-cli (Cargo.lock version)
        run: |
          V=$(grep -A1 '^name = "wasm-bindgen"$' Cargo.lock | grep version | head -1 | cut -d'"' -f2)
          cargo install wasm-bindgen-cli --version "$V" --locked
      - name: install pinned binaryen (reftypes-safe; old apt binaryen breaks externref table grow)
        run: |
          curl -sL https://github.com/WebAssembly/binaryen/releases/download/version_119/binaryen-version_119-x86_64-linux.tar.gz | tar xz
          echo "$PWD/binaryen-version_119/bin" >> "$GITHUB_PATH"
      - name: build + budget gate (8 MiB)
        run: bash scripts/build-wasm.sh
