# sheet.lower.* — page-surface lowering (spec §8.2). The page surface
# emits a NATIVE Paged <Table> (S-03 RESOLVED — the wire carries
# insertTable / cell-addressed insertText / setCellSpan / tableCell-scoped
# cell properties); the spec §2.2 tab-text degradation is RETAINED as the
# explicit fallback lane. Taxonomy:
# implemented -> paginates -> reflow-stable -> round-trips.

- id: sheet.lower.range.single-frame
  title: Lower (sheet, range, view options) -> LoweredContent IR for one frame (no threading — T1)
  tier: implemented
  status: implemented
  provenance: ["spec §8.2, §2.2 degradation clause"]
  tests:
    rust: ["sheet-conformance/tests/lower.rs::sheet_lower_range_single_frame"]

- id: sheet.lower.text.formatted
  title: Lowered cell text IS the number-formatted value (sheet-format output, spec §8.3)
  tier: implemented
  status: implemented
  provenance: ["spec §8.3 — the lowered text is the formatted value"]
  tests:
    rust: ["sheet-conformance/tests/lower.rs::sheet_lower_text_formatted"]

- id: sheet.lower.rules.grid
  title: Grid rules (h/v lines) emitted in frame-content coordinates
  tier: implemented
  status: implemented
  provenance: ["spec §8.2, §8.5 content-space principle"]
  tests:
    rust: ["sheet-conformance/tests/lower.rs::sheet_lower_rules_grid"]

- id: sheet.lower.merges
  title: Merged spans carried in the IR
  tier: implemented
  status: implemented
  provenance: ["spec §8.2"]
  tests:
    rust: ["sheet-conformance/tests/lower.rs::sheet_lower_merges"]

- id: sheet.lower.deterministic
  title: Lowering is deterministic (same model+range+options -> identical IR)
  tier: implemented
  status: implemented
  provenance: ["spec §12.4 determinism"]
  tests:
    rust: ["sheet-conformance/tests/lower.rs::sheet_lower_deterministic"]

- id: sheet.lower.native-table
  title: "Page lowering emits a NATIVE Paged <Table>: insertTable (widths/heights inline) + per-cell insertText via TextCellAddr + setCellSpan per merge + tableCell-scoped cellFillColor / cell*EdgeStrokeWeight for style fills/borders and grid rules"
  tier: implemented
  status: implemented
  # RULING (S-03 RESOLVED): the wire carries native table ops (core
  # protocol v37+; plugin-data D-02 is the sibling precedent). Column
  # widths/row heights ride the insertTable args (no separate
  # setColumnWidth/setRowHeight ops needed at creation). The tab-text
  # degradation is RETAINED as the explicit fallback lane (`lane:
  # "tab-text"`, plus the runtime fallback when a host rejects
  # insertTable) — selectable and tested, never the default.
  # HONEST IR GAP: Rule/LoweredStyle borders carry geometry/booleans only —
  # no stroke weight/colour; the translator uses a documented hairline
  # default (CELL_EDGE_STROKE_PT). Lowering real weights/colours is a
  # sheet-lower (Rust) follow-on, not a TS decision.
  provenance:
    - "plugin-api wire.d.ts: insertTable / TextCellAddr / setCellSpan / tableCell ElementId / cell* PropertyPaths"
    - "RFI §6 S-03 (resolved)"
    - "spec §8.2 + §2.2 (degradation retained as fallback)"
  tests:
    vitest:
      - "packages/sheet-host-model/test/lower-to-table.spec.ts"
      - "packages/sheet-bundle/test/lower-flow.spec.ts"
