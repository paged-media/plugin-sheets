# sheet.lower.* — page-surface lowering (spec §8.2). T0 = single frame,
# tab-text degradation (BREAKAGE S-03); taxonomy:
# implemented -> paginates -> reflow-stable -> round-trips.

- id: sheet.lower.range.single-frame
  title: Lower (sheet, range, view options) -> LoweredContent IR for one frame (no threading — T1)
  tier: implemented
  status: planned
  provenance: ["spec §8.2, §2.2 degradation clause"]
  tests:
    rust: ["sheet-conformance/tests/lower.rs::sheet_lower_range_single_frame"]

- id: sheet.lower.text.formatted
  title: Lowered cell text IS the number-formatted value (sheet-format output, spec §8.3)
  tier: implemented
  status: planned
  provenance: ["spec §8.3 — the lowered text is the formatted value"]
  tests:
    rust: ["sheet-conformance/tests/lower.rs::sheet_lower_text_formatted"]

- id: sheet.lower.rules.grid
  title: Grid rules (h/v lines) emitted in frame-content coordinates
  tier: implemented
  status: planned
  provenance: ["spec §8.2, §8.5 content-space principle"]
  tests:
    rust: ["sheet-conformance/tests/lower.rs::sheet_lower_rules_grid"]

- id: sheet.lower.merges
  title: Merged spans carried in the IR
  tier: implemented
  status: planned
  provenance: ["spec §8.2"]
  tests:
    rust: ["sheet-conformance/tests/lower.rs::sheet_lower_merges"]

- id: sheet.lower.deterministic
  title: Lowering is deterministic (same model+range+options -> identical IR)
  tier: implemented
  status: planned
  provenance: ["spec §12.4 determinism"]
  tests:
    rust: ["sheet-conformance/tests/lower.rs::sheet_lower_deterministic"]
