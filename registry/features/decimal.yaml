# sheet.calc.decimal.* — the D-6 exact-decimal SPIKE (spec §3, §5.1, M3).
# Build-consumed half of the two-registry split; the state-repo row is the
# status ledger.
#
# SPIKE — exploratory. v1 stays Excel-compatible f64 (the `F64` Numeric impl
# is the shipped default and remains so regardless of the spike outcome). The
# spike explores whether an exact-decimal Numeric backend is a viable v2
# differentiator. Phase A carved the seam: sheet-fn gained an `exact-decimal`
# cargo feature (OFF by default) gating a `num_decimal` stub module, so the
# workspace builds with AND without the feature. These rows are the spike
# track's deliverables.

- id: sheet.calc.decimal.numeric-trait-boundary
  title: "Numeric trait boundary (already exists) — the Numeric trait + F64 IEEE-754 backend that keeps exact-decimal open (D-6)"
  status: implemented
  note: >
    SPIKE PREREQUISITE (already shipped in M0): sheet-fn/src/num.rs defines the
    `Numeric` trait (from_f64/to_f64/add/sub/mul/div/pow) with the one T0 impl
    `F64`. Kernels route arithmetic through the trait, so a `Decimal` impl is a
    type substitution, not a rewrite. This is the boundary the spike builds on.
  provenance: ["spec §5.1 D-6 (numeric core: f64 vs exact-decimal, trait boundary keeps decimal mode open)"]
  tests:
    rust: ["sheet-fn/src/num.rs::f64_roundtrip_and_ops"]

- id: sheet.calc.decimal.decimal-impl
  title: "Decimal Numeric impl behind the `exact-decimal` cargo feature (SPIKE)"
  status: planned
  note: >
    SPIKE. Phase A: the `exact-decimal` feature flag + a `num_decimal` stub
    module (cfg-gated) exist; the workspace builds both with and without the
    feature. Phase B: a real `Decimal` Numeric impl over a permissive carrier
    (rust_decimal MIT, or a hand-rolled fixed-decimal — the spike decides),
    added as an OPTIONAL dependency keyed on the same feature. Exploratory;
    f64 stays the v1 default.
  provenance: ["spec §3 (Excel-compat as ruling)", "spec §5.1 D-6", "spec §13 M3 (exact-decimal spike)"]
  tests:
    rust: ["sheet-conformance/tests/decimal.rs::sheet_calc_decimal_impl"]

- id: sheet.calc.decimal.divergence-corpus
  title: "Divergence corpus — cases where f64 and decimal differ (e.g. 0.1+0.2) (SPIKE)"
  status: planned
  note: >
    SPIKE. A golden corpus of arithmetic where IEEE-754 f64 and an exact
    decimal diverge — the canonical 0.1 + 0.2 = 0.30000000000000004 (f64) vs
    0.3 (decimal), accumulation drift, etc. Quantifies what the spike would buy
    and where Excel itself (f64-based) would disagree with a decimal engine.
  provenance: ["spec §5.1 D-6", "IEEE-754 vs decimal arithmetic (public)"]
  tests:
    rust: ["sheet-conformance/tests/decimal.rs::sheet_calc_decimal_divergence"]
    corpus: ["corpus/decimal-corpus/divergence.golden.tsv"]

- id: sheet.calc.decimal.spike-report
  title: "Written adopt/defer recommendation for the exact-decimal mode (SPIKE)"
  status: planned
  note: >
    SPIKE deliverable. A written recommendation (adopt as a v2 feature flag vs
    defer) grounded in the divergence corpus, the perf/size cost of the decimal
    backend, and the Excel-compat tension (Excel is f64, so an exact-decimal
    mode would diverge from the oracle by design). The decision is recorded as
    a registry ruling; f64 remains v1 either way.
  provenance: ["spec §3 (Excel-compat is a ruling)", "spec §5.1 D-6", "spec §13 M3"]
  tests:
    rust: ["sheet-conformance/tests/decimal.rs::sheet_calc_decimal_spike_report"]
