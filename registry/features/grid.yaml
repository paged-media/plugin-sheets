# sheet.grid.* — sheets-mode vector grid scene (M1 grid track, spec §8.1,
# S-02). sheet-grid lands its viewport windowing (covered by the crate's own
# unit tests in sheet-grid/src/lib.rs); the panel-grid TypeScript surface
# (GRID-TS track) adds the pure GridScene→SVG translation (grid.ts), the
# session.gridScene/setGridSelection/editCell glue, and the interim grid
# panel. These rows are IMPLEMENTED: the engine-side windowing/parity/
# selection are proven by the sheet-grid Rust unit tests, and the panel edit/
# select/commit contract by the vitest suites. INTERIM panel grid only —
# in-frame sheets mode (S-01/S-02) stays SDK-blocked. Schema:
# id/title/status/provenance/tests.

- id: sheet.grid.scene-windowing
  title: Generate a GridScene for a viewport — cumulative offsets + visible-cell materialization
  status: implemented
  provenance: ["spec §8.1", "sheet-grid/src/lib.rs::grid_scene"]
  tests:
    rust: ["sheet-grid/src/lib.rs::sheet_grid_scene_windowing"]
    vitest: ["packages/sheet-host-model/test/grid.spec.ts"]

- id: sheet.grid.virtualization
  title: Windowing touches only viewport-visible populated cells (O(visible), not O(sheet)) on a 1M-row sheet
  status: implemented
  provenance: ["spec §8.1 virtualization"]
  tests:
    rust: ["sheet-grid/src/lib.rs::sheet_grid_scene_windowing"]

- id: sheet.grid.formatted-parity
  title: Grid cell text equals the page-lowering formatted value for the same cell (one render path)
  status: implemented
  provenance: ["spec §8.3 — the lowered/grid text IS the formatted value"]
  tests:
    rust: ["sheet-grid/src/lib.rs::sheet_grid_scene_formatted_text"]

- id: sheet.grid.selection
  title: Selection rectangle carried on the scene (anchor + span), painted by the panel
  status: implemented
  provenance: ["spec §8.1 — the panel supplies selection"]
  tests:
    rust: ["sheet-grid/src/lib.rs::sheet_grid_scene_selection"]
    vitest: ["packages/sheet-host-model/test/grid.spec.ts"]

- id: sheet.grid.panel-edit-contract
  title: The grid panel edit/commit contract — gridSceneToSvg render + click→select + dblclick→edit→Enter→engine.setCell over the scene
  status: implemented
  provenance: ["spec §8.1, S-02 grid surface (interim panel grid)"]
  tests:
    vitest:
      - "packages/sheet-host-model/test/grid.spec.ts"
      - "packages/sheet-bundle/test/grid-panel.spec.ts"

- id: sheet.grid.cell-input-reprint
  title: get_cell_input re-prints a cell's enterable text (formula =-prefixed, literals verbatim) — the ADR-012 undo journal's faithful inverse
  status: implemented
  provenance: ["ADR-012 (K-1 §8.0 undo coalescing, Tier 0/1)", "sheet-js/src/core.rs::get_cell_input"]
  tests:
    rust: ["sheet-conformance/tests/js_surface.rs::sheet_grid_cell_input_reprint_round_trips"]

- id: sheet.grid.session-undo-journal
  title: In-session undo/redo over committed cell edits (ADR-012 Tier 1) — bundle journal of setCell inverses behind editContext onUndo/onRedo; document stack suspended until modal exit
  status: implemented
  provenance: ["ADR-012", "plugin-api EditContextContribution.onUndo/onRedo"]
  tests:
    vitest: ["packages/sheet-bundle/test/session-undo.spec.ts"]

- id: sheet.grid.clipboard.copy-range
  title: Copy the selected range to host.clipboard as a tabular payload (cells as formatted display strings) + a TSV text fallback (K-6 / S-14)
  status: implemented
  provenance:
    - "RFI §6 K-6 / S-14 — host.clipboard with a { text, tabular } payload"
    - "sheet-js/src/core.rs::get_range_values (the engine-owned range read)"
  tests:
    rust: ["sheet-conformance/tests/js_surface.rs::sheet_grid_clipboard_copy_range_values"]
    vitest: ["packages/sheet-bundle/test/clipboard.spec.ts"]

- id: sheet.grid.clipboard.copy-cell-cap
  title: Clipboard range copy honors the T0 cell cap (a full-sheet range is a boundary error, never a panic) — the session stays usable
  status: implemented
  provenance: ["RFI §6 K-6", "the get_range_lowered T0 cap discipline"]
  tests:
    rust: ["sheet-conformance/tests/js_surface.rs::sheet_grid_clipboard_copy_caps_full_sheet"]

- id: sheet.grid.clipboard.paste-range
  title: Paste host.clipboard (tabular or TSV) into the grid at the selection anchor — each cell re-typed through the journaled editCell lane (one grouped undo step)
  status: implemented
  provenance:
    - "RFI §6 K-6 / S-14 — paste lands tabular/TSV at the anchor"
    - "ADR-012 Tier 1 — the paste is a grouped journal batch"
  tests:
    vitest: ["packages/sheet-bundle/test/clipboard.spec.ts"]
