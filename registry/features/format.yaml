- id: sheet.format.datetime.tokens
  title: Date/time tokens (yyyy/yy, mmmm/mmm/mm/m, dddd/ddd/dd/d, hh/h, mm/m minutes-context, ss/s, AM/PM)
  status: implemented
  provenance: ["ECMA-376 §18.8.31 (date-time codes)"]
  tests:
    rust: ["sheet-conformance/tests/format.rs::sheet_format_datetime_tokens"]
    corpus: ["corpus/format-corpus/datetime.golden.tsv"]

- id: sheet.format.date.serial-1900
  title: 1900 date system serial<->calendar conversion
  status: implemented
  provenance: ["ECMA-376 §18.17.4.1", "OpenFormula date conventions"]
  tests:
    rust: ["sheet-conformance/tests/serial_date.rs::sheet_format_date_serial_1900"]

- id: sheet.format.date.leap1900
  title: "1900 leap-year bug — serial 60 is the nonexistent 1900-02-29 (deliberate Excel-compat defect)"
  ruling: "Adopted bug-for-bug: serials 1-59 map to 1900-01-01..1900-02-28, serial 60 renders 1900-02-29, serial 61 is 1900-03-01. Lotus 1-2-3 heritage."
  status: implemented
  provenance: ["Microsoft KB 214326 (public)", "ECMA-376 date-system notes"]
  tests:
    rust: ["sheet-conformance/tests/serial_date.rs::sheet_format_date_leap1900"]

- id: sheet.format.date.serial-1904
  title: 1904 date system (serial 0 = 1904-01-01, no leap bug)
  status: implemented
  provenance: ["ECMA-376 §18.17.4.1 (date1904)"]
  tests:
    rust: ["sheet-conformance/tests/serial_date.rs::sheet_format_date_serial_1904"]

- id: sheet.format.text-section
