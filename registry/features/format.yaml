# sheet.format.* — number-format engine features and rulings (spec §9).

- id: sheet.format.general
  title: General format — shortest round-trip capped at 15 significant digits, scientific switch for extreme magnitudes
  status: implemented
  provenance: ["ECMA-376 §18.8.30 (General)", "Excel 15-digit display semantics (public docs)"]
  tests:
    rust: ["sheet-conformance/tests/format.rs::sheet_format_general"]
    corpus: ["corpus/format-corpus/general.golden.tsv"]

- id: sheet.format.number.placeholders
  title: "Digit placeholders 0 # ? with decimal point, thousands separator, and , scaling"
  status: implemented
  provenance: ["ECMA-376 §18.8.31 (number format codes)"]
  tests:
    rust: ["sheet-conformance/tests/format.rs::sheet_format_number_placeholders"]
    corpus: ["corpus/format-corpus/number.golden.tsv"]

- id: sheet.format.percent
  title: Percent formats (value scaling by 100 + % literal)
  status: implemented
  provenance: ["ECMA-376 §18.8.31"]
  tests:
