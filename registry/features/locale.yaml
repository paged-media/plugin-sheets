# sheet.format.locale.* — locale/localization features for the number-format
# engine (spec §9; decision D-8, v1 set = en/de minimum, extended to the
# Western-European Latin tier fr/es/it as an additive data-table expansion).
# Build-consumed half of the two-registry split; the state-repo row is the
# status ledger.
#
# Phase A carved the seam: FormatCtx gained a `locale` field +
# FormatCtx::new(date_system, locale), CalcSettings gained `locale`, the
# locale-data table (sheet-format/src/locale.rs) ships en-US (full) + de-DE
# (separators + month/day names + AM/PM + default short-date), and number.rs /
# datetime.rs read separators + names from the table. M3 Phase B (this pass)
# landed the de RENDERING corpus + tests, the `[$…-LCID]` locale token, the
# workbook-locale derivation, and the locale-aware VALUE parse. en-US output is
# BYTE-IDENTICAL to M0 (the format goldens are unchanged).
#
# NOTE on scope: the formula DIALECT stays en — only VALUE parsing/formatting
# localizes (separators/names). The format-code token grammar (yyyy/mm/dd,
# 0/#/?, the literal . and , in a code) is locale-NEUTRAL; the locale only
# decides which glyph the renderer emits for those tokens.

- id: sheet.format.locale.separators
  title: "Locale decimal/group/list separators (en-US ./,/, ; de-DE ,/./;) read from the locale-data table"
  status: implemented
  note: >
    number.rs reads ctx.locale's decimal + group from the locale-data table:
    de-DE renders "," decimal + "." group, en-US keeps "."/"," (output
    byte-identical to M0). The locale-de.golden.tsv corpus drives the de
    separators end-to-end; the list separator is display-only (the formula
    parser's argument separator stays the locale-NEUTRAL ",").
  provenance: ["ECMA-376 §18.8.31 (number format codes)", "CLDR decimal/group separators", "spec §9, D-8"]
  tests:
    rust: ["sheet-conformance/tests/locale.rs::sheet_format_locale_separators"]
    corpus: ["corpus/format-corpus/locale-de.golden.tsv"]

- id: sheet.format.locale.month-day-names
  title: "Localized long+short month and day names (en-US January../Sunday.. ; de-DE Januar../Montag..) from the locale-data table"
  status: implemented
  note: >
    datetime.rs reads loc.months_full/abbr + loc.days_full/abbr for
    mmmm/mmm/dddd/ddd: de-DE renders Januar/Februar.. + Montag/Freitag.. (abbrev
    Jan/Mrz/Dez, Mo/Fr/So); en-US keeps January../Sunday.. byte-identical. The
    de calendar names are driven by the locale-de.golden.tsv corpus.
  provenance: ["ECMA-376 §18.8.31 (date-time codes)", "CLDR month/day names", "spec §9, D-8"]
  tests:
    rust: ["sheet-conformance/tests/locale.rs::sheet_format_locale_month_day_names"]
    corpus: ["corpus/format-corpus/locale-de.golden.tsv"]

- id: sheet.format.locale.ampm
  title: "Localized AM/PM strings (long + short) per locale from the locale-data table"
  status: implemented
  note: >
    RULING RESOLVED: an explicit AM/PM format token renders the literal en
    "AM"/"PM" (and short "A"/"P") in de-DE too — Excel's German locale does NOT
    substitute vorm./nachm. for the AM/PM token, so the de table mirrors en for
    am/pm/am_short/pm_short. The German 24-hour convention lives in the AUTHORING
    (the code drops the AM/PM token, e.g. HH:mm), not in the engine swapping in
    German strings. datetime.rs reads loc.am/pm + loc.am_short/pm_short.
  provenance: ["ECMA-376 §18.8.31", "Excel de-DE AM/PM token behavior (public docs)", "spec §9, D-8"]
  tests:
    rust: ["sheet-conformance/tests/locale.rs::sheet_format_locale_ampm"]

- id: sheet.format.locale.locale-from-workbook
  title: "Parse the workbook locale/codepage hint (xlsx) into CalcSettings.locale"
  status: implemented
  note: >
    Two paths land. (1) PER-CODE: a `[$<symbol>-<LCID>]` token on a numFmt
    carries a display locale (parse.rs maps the LCID via locale_from_lcid;
    CompiledFormat.locale OVERRIDES the FormatCtx locale), so a cell numFmt with
    [$-407] renders de regardless of the document locale. (2) PER-WORKBOOK:
    sheet-xlsx derives CalcSettings.locale from the FIRST custom numFmt code that
    declares a non-en LCID (styles.rs::workbook_locale). HONEST RULING: OOXML has
    NO document-locale element, so absent any [$…-LCID] hint the locale stays
    Locale::EnUs — set via the model/host, NOT auto-detected; en is also the
    fallback for any unmodelled LCID. The currency-token symbol/position rules
    (format2 `sheet.format.locale-currency-token`) are unchanged; only the
    previously-dropped LCID now selects the separators.
  provenance: ["ECMA-376 §18.8.30 ([$-locale] currency/locale modifier)", "OOXML has no <calcPr> locale (honest fallback)", "spec §9, §10, D-8"]
  tests:
    rust: ["sheet-conformance/tests/locale.rs::sheet_format_locale_from_workbook"]

- id: sheet.format.locale.de-de-rendering
  title: "de-DE rendering pass — number + date output through the de locale (separators + names) end-to-end"
  status: implemented
  note: >
    End-to-end de rendering through one FormatCtx::new(date_system, Locale::DeDe):
    numbers (#,##0.00 of -1234.5 -> -1.234,50) and dates (dddd, d. mmmm yyyy ->
    Freitag, 1. Januar 2021) localize together. The compiled format is
    locale-NEUTRAL — the SAME CompiledFormat renders en or de purely by the
    FormatCtx, so the FormatCache key need not include the locale. The
    locale-de.golden.tsv corpus covers separators + names + ampm.
  provenance: ["ECMA-376 §18.8.31", "spec §9, D-8"]
  tests:
    rust: ["sheet-conformance/tests/locale.rs::sheet_format_locale_de_de_rendering"]
    corpus: ["corpus/format-corpus/locale-de.golden.tsv"]

- id: sheet.format.locale.number-parse-locale
  title: "Locale-aware VALUE parsing (NUMBERVALUE / coercion) — only the VALUE localizes, never the formula dialect"
  status: implemented
  note: >
    sheet-format gains parse_number_locale(s, locale) + parse_number_seps(s,
    decimal, group) — the inverse of render_number's separator handling (strip
    group, re-point decimal, parse f64). NUMBERVALUE(text, [decimal], [group])
    already takes explicit separators, so it is locale-EXPLICIT and parses
    "1.234,50" under de seps. CRITICAL SCOPE RULING: the formula DIALECT stays en
    (function names, the "," argument separator) and the IMPLICIT coercion
    (coerce::to_number) stays en — a bare de-formatted "1.234,50" is NOT
    auto-localized. Localization is opt-in via an EXPLICIT locale/separators,
    never the parser/lexer.
  provenance: ["ECMA-376 (NUMBERVALUE)", "OpenFormula coercion", "spec §9, D-8"]
  tests:
    rust: ["sheet-conformance/tests/locale.rs::sheet_format_locale_number_parse"]

- id: sheet.format.locale.latin-tier
  title: "Western-European Latin locales (fr-FR / es-ES / it-IT) — additive LocaleData table rows + LCID mapping"
  status: implemented
  note: >
    A pure DATA-TABLE expansion of the en/de machinery: fr-FR / es-ES / it-IT
    each ship as one LocaleData const row (separators + Gregorian month/day
    names + en AM/PM token + default dd/mm/yyyy short-date) plus a
    locale_data/locale_from_lcid arm. NO rendering-code change — number.rs and
    datetime.rs already read every separator/name from the table, so the new
    locales render purely from their rows. Separators: fr ","/space group, es
    ","/".", it ","/"." (decimal/group). LCID primary-language bits map
    0x0c→fr, 0x0a→es, 0x10→it (so a [$-40c]#,##0 numFmt renders fr). They share
    the de-DE AM/PM ruling (an explicit AM/PM token renders the literal en
    "AM"/"PM"; the 24h convention lives in the AUTHORING). en-US AND de-DE
    output stay BYTE-IDENTICAL — the locale-latin.golden.tsv corpus is an
    additive mirror with per-locale en/de regression guards in the test.
  provenance: ["ECMA-376 §18.8.31 (number/date codes)", "ECMA-376 §18.8.30 ([$-LCID])", "CLDR fr/es/it separators + month/day names", "spec §9, D-8 (extended)"]
  tests:
    rust: ["sheet-conformance/tests/locale.rs::sheet_format_locale_latin_tier"]
    corpus: ["corpus/format-corpus/locale-latin.golden.tsv"]

- id: sheet.format.locale.cjk-followup
  title: "CJK locales (ja/zh) — scoped v2 follow-up, NOT a table row (era calendars + 午前/午後 AM/PM need oracle verification)"
  status: planned
  note: >
    HONEST NON-GOAL FOR v1. The locale machinery is data-driven (LocaleData +
    locale_data/locale_from_lcid), so the Latin tier (fr/es/it) dropped in as
    pure table rows. CJK locales do NOT: Japanese ja-JP and Chinese zh-CN add
    semantics a separator/name swap cannot express — the Japanese imperial ERA
    calendar (Gengou: 令和/平成 via the `ggg`/`gg`/`g`/`e` tokens, ECMA-376
    §18.8.31), CJK month/day glyph conventions (1月..12月, 日曜日..土曜日), and
    a genuinely localized AM/PM (午前/午後) that does NOT mirror en the way
    fr/es/it/de do. Each needs oracle (Excel) verification before it can be a
    LocaleData row, and the era calendar needs serial→era derivation in
    datetime.rs (NOT a table read). The file that would expand is
    sheet-format/src/locale.rs (rows) PLUS sheet-format/src/datetime.rs (the
    `g`/`e` era tokens) — the latter is real rendering code, which is why this
    is a scoped v2 item, not a drive-in table row. Tracked here so the seam
    stays honest.
  provenance: ["ECMA-376 §18.8.31 (g/gg/ggg era + e tokens)", "Japanese imperial calendar (Gengou) public docs", "spec §9, D-8 scope"]
