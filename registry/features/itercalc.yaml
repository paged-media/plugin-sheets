# sheet.calc.iterative.* (T2/M2, spec §6.2 / D-7) — iterative (circular)
# calculation. OFF BY DEFAULT (D-7); when enabled, cells in a dependency cycle
# iterate to a fixed point (Excel-style max-iterations / max-change) instead of
# the default `sheet.calc.circular` ruling that stores #REF! for cycle members.
#
# STATUS: planned — the M2 iterative-calc track wires the convergence loop into
# the scheduler (sheet-calc) behind the enable flag, then flips these rows. The
# default (flag off) behavior is unchanged: a cycle stores #REF! and is reported
# on RecalcResult::circular (the existing sheet.calc.circular row).

- id: sheet.calc.iterative.enable-flag
  title: Iterative-calc enable flag (D-7 — OFF by default; CalcSettings carries the toggle)
  ruling: "D-7: iterative calculation is OFF by default. With the flag off, a cycle keeps the sheet.calc.circular ruling (#REF! stored, reported on RecalcResult::circular). The flag is a CalcSettings field round-tripped from the workbook calcPr (iterate/iterateCount/iterateDelta)."
  status: planned
  provenance: ["spec §6.2, §14 D-7", "ECMA-376 §18.2.2 (calcPr iterate/iterateCount/iterateDelta)"]
  tests:
    rust: ["sheet-conformance/tests/itercalc.rs::sheet_calc_iterative_enable_flag"]

- id: sheet.calc.iterative.max-iter
  title: Max-iterations bound (the iteration cap; Excel default 100)
  status: planned
  provenance: ["spec §6.2, §14 D-7", "ECMA-376 §18.2.2 (iterateCount)"]
  tests:
    rust: ["sheet-conformance/tests/itercalc.rs::sheet_calc_iterative_max_iter"]

- id: sheet.calc.iterative.max-change
  title: Max-change (convergence delta; Excel default 0.001) — stop early when the largest cell delta falls below it
  status: planned
  provenance: ["spec §6.2, §14 D-7", "ECMA-376 §18.2.2 (iterateDelta)"]
  tests:
    rust: ["sheet-conformance/tests/itercalc.rs::sheet_calc_iterative_max_change"]

- id: sheet.calc.iterative.convergence
  title: Convergence loop — iterate the cycle's cells until max-iter or max-change, deterministically (fixed evaluation order)
  status: planned
  provenance: ["spec §6.2 determinism", "spec §14 D-7"]
  tests:
    rust: ["sheet-conformance/tests/itercalc.rs::sheet_calc_iterative_convergence"]

- id: sheet.calc.iterative.circular-with-iteration
  title: Cells in a cycle iterate to a fixed point (instead of #REF!) when iteration is enabled
  ruling: "With the enable flag ON, a detected cycle is evaluated iteratively to a fixed point rather than stored as #REF!. This SUPERSEDES the sheet.calc.circular ruling for that cycle only while the flag is on."
  status: planned
  provenance: ["spec §6.2, §14 D-7"]
  tests:
    rust: ["sheet-conformance/tests/itercalc.rs::sheet_calc_iterative_circular_with_iteration"]
