- id: sheet.fn.lookup.offset
  name: OFFSET
  family: lookup
  arity: { min: 3, max: 5 }
  volatility: volatile
  range_aware: true
  ref_args: true
  rust: lookup2::offset
  status: planned
  provenance: ["ECMA-376 §18.17.7 (OFFSET) — reference, rows, cols, [height], [width]. DEFERRED: the offset target is a cell OUTSIDE the materialized base RangeView; the FROZEN pure kernel cannot read it. Needs an EvalCtx cell_reader amendment (see module header / report)."]
  tests:
    rust: ["sheet-conformance/tests/fn_lookup2.rs::sheet_fn_lookup_offset"]
    corpus: []

