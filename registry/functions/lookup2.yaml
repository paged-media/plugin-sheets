  ref_args: true
  special_form: true
  status: implemented
  provenance: ["ECMA-376 §18.17.7 (OFFSET) — reference, rows, cols, [height], [width]. EVALUATOR SPECIAL FORM (M2 Phase A): the base reference arg is resolved AS a reference in sheet-calc/eval.rs (eval_as_ref), the offset top-left + optional height/width compute a RangeRef, #REF! when the target leaves the sheet bounds. VOLATILE."]
  tests:
    rust: ["sheet-conformance/tests/special_forms.rs::sheet_fn_lookup_offset"]
    corpus: []

