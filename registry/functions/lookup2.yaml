# sheet.fn.lookup.* (M1 additions) — lookup/reference family. Schema: see
# math.yaml. Rust kernels under sheet-fn/src/families/lookup2.rs (the M1
# lookup track). All rows status: planned.
#
# T1 ruling (OFFSET/INDIRECT): in T0/T1 these do NOT return a first-class
# reference object — they return the VALUE (a 1x1) or a materialized
# range-view of the addressed region. The kernel resolves the address and
# reads the already-computed cells (ref_args lets the convention hand the
# anchor reference in). Recorded per-row.

- id: sheet.fn.lookup.xlookup
  name: XLOOKUP
  family: lookup
  arity: { min: 3, max: 6 }
  volatility: none
  range_aware: true
  rust: lookup2::xlookup
  status: planned
  provenance: ["Microsoft XLOOKUP (public docs) — lookup, lookup_array, return_array, [if_not_found], [match_mode], [search_mode]"]
  tests:
    rust: ["sheet-conformance/tests/fn_lookup.rs::sheet_fn_lookup_xlookup"]
    corpus: ["corpus/fn-corpus/lookup/xlookup.golden.tsv"]

