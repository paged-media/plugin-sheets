# sheet.fn.lookup.* (M1/T1 additions) — lookup/reference family. Schema: see
# math.yaml. Rust kernels under sheet-fn/src/families/lookup2.rs (the M1/T1
# lookup track, spec §11 T1 "full lookup incl. XLOOKUP/INDEX/MATCH").
#
# Implemented (T1, pure — no model access): XLOOKUP, XMATCH, ADDRESS, ROWS,
# COLUMNS.
#
# EVALUATOR SPECIAL FORMS (M2 Phase A, `special_form: true`) — OFFSET /
# INDIRECT / FORMULATEXT. These inherently READ THE MODEL (a reference/formula
# by address) and cannot be pure `fn(&[Arg], &EvalCtx) -> CellValue` kernels:
# the OFFSET target lies OUTSIDE the materialized base RangeView, INDIRECT
# parses an address at runtime, FORMULATEXT needs the formula source string
# (never a CellValue). Rather than ripple a model reader through the FROZEN
# `EvalCtx` (rejected — it would touch every kernel), they are handled as
# EVALUATOR SPECIAL FORMS in `sheet-calc/eval.rs`, where the engine already
# holds the model (this mirrors how ROW/COLUMN ref_args + ranges are already
# special-cased). The `special_form: true` flag makes eval intercept BEFORE
# materializing args + calling dispatch; the pure dispatch door returns #NAME?
# for these rows (it must never be reached). No model reader on EvalCtx; the
# pure-kernel signature stays frozen. Nothing is faked.

- id: sheet.fn.lookup.xlookup
  name: XLOOKUP
  family: lookup
  arity: { min: 3, max: 6 }
  volatility: none
  range_aware: true
  rust: lookup2::xlookup
  status: implemented
  provenance: ["Microsoft XLOOKUP (public docs) — lookup, lookup_array, return_array, [if_not_found], [match_mode], [search_mode]"]
  tests:
    rust: ["sheet-conformance/tests/fn_lookup2.rs::sheet_fn_lookup_xlookup"]
    corpus: ["corpus/fn-corpus/lookup2/xlookup.golden.tsv"]

