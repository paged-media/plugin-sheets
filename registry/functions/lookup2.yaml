# sheet.fn.lookup.* (M1/T1 additions) — lookup/reference family. Schema: see
# math.yaml. Rust kernels under sheet-fn/src/families/lookup2.rs (the M1/T1
# lookup track, spec §11 T1 "full lookup incl. XLOOKUP/INDEX/MATCH").
#
# Implemented (T1, pure — no model access): XLOOKUP, XMATCH, ADDRESS, ROWS,
# COLUMNS.
#
# DEFERRED (status: planned) — OFFSET / INDIRECT / FORMULATEXT. These need to
# read arbitrary cells (or a cell's formula source) that are NOT among the
# kernel's `Arg` values — the offset target lies OUTSIDE the materialized base
# RangeView, INDIRECT parses an address at runtime, FORMULATEXT needs the
# formula string (never a CellValue). The pure-kernel signature and `EvalCtx`
# are FROZEN (CLAUDE.md §"Interface freeze"); unblocking these requires giving
# EvalCtx a `cell_reader`/`formula_reader` closure, which forces a lifetime on
# EvalCtx and ripples through every family kernel + sheet-calc — a versioned
# orchestrator amendment, not a drive-by edit. They stay planned (→ #NAME?,
# uncallable by construction) with the limitation documented in the kernel
# module header and the implementation report. Nothing is faked.

- id: sheet.fn.lookup.xlookup
  name: XLOOKUP
  family: lookup
  arity: { min: 3, max: 6 }
  volatility: none
  range_aware: true
  rust: lookup2::xlookup
  status: implemented
  provenance: ["Microsoft XLOOKUP (public docs) — lookup, lookup_array, return_array, [if_not_found], [match_mode], [search_mode]"]
  tests:
    rust: ["sheet-conformance/tests/fn_lookup2.rs::sheet_fn_lookup_xlookup"]
    corpus: ["corpus/fn-corpus/lookup2/xlookup.golden.tsv"]

