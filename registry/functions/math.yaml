# sheet.fn.math.* — math/trig family (T0, spec §11).
# Schema (FROZEN, M0 phase 0 — consumed by sheet-core/build.rs and
# sheet-fn/build.rs; an unregistered function is uncallable by
# construction):
#   id          immutable feature id (joins the state registry by id)
#   name        the callable name (UPPER, Excel dialect)
#   family      module under sheet-fn/src/families/
#   arity       { min, max } — max: null = variadic
#   volatility  none | volatile
#   range_aware true when the fn accepts Arg::Range
#   ref_args    true when args must arrive as references (ROW/COLUMN)
#   rust        symbol under sheet_fn::families:: implementing
#               fn(&[Arg], &EvalCtx) -> CellValue
#   status      planned | implemented   (gates dispatch + coverage)
#   provenance  sources (ECMA-376 / OpenFormula / public docs / oracle)
#   tests       rust test pointers + golden corpus paths (the coverage
#               gate verifies both for every implemented row)

- id: sheet.fn.math.sum
  name: SUM
  family: math
  arity: { min: 1, max: null }
  volatility: none
  range_aware: true
  rust: math::sum
  status: planned
  provenance: ["ECMA-376 §18.17.7 (SUM)", "OpenFormula §6.16.61"]
  tests:
    rust: ["sheet-conformance/tests/fn_math.rs::sheet_fn_math_sum"]
    corpus: ["corpus/fn-corpus/math/sum.golden.tsv"]

