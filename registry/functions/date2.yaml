# sheet.fn.date.* (M1 additions) — date/time arithmetic family. Schema: see
# math.yaml. Rust kernels under sheet-fn/src/families/date2.rs (the M1
# date track). Provenance: ECMA-376 §18.17.7 + public Microsoft function
# docs. Conformance: sheet-conformance/tests/fn_date2.rs +
# corpus/fn-corpus/date2/. Excel-compat rulings (DAYS360 US end-of-month,
# DATEDIF reversed-range #NUM!, YEARFRAC actual/actual denominator) are
# documented bug-for-bug in the date2.rs module docs.

- id: sheet.fn.date.edate
  name: EDATE
  family: date
  arity: { min: 2, max: 2 }
  volatility: none
  range_aware: false
  rust: date2::edate
  status: implemented
  provenance: ["ECMA-376 §18.17.7 (EDATE) — start_date, months"]
  tests:
    rust: ["sheet-conformance/tests/fn_date2.rs::sheet_fn_date_edate"]
    corpus: ["corpus/fn-corpus/date2/edate.golden.tsv"]

