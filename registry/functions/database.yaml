# sheet.fn.database.* (T2/M2) — the Excel database (D-) function family. Schema:
# see math.yaml. Each D-function takes (database, field, criteria): a database
# range whose first row is column headers, a `field` selecting the column to
# aggregate (a header label text, a 1-based column number, or a cell ref to a
# header), and a criteria range (its own header row + condition rows). The
# matching rows of the selected column are aggregated.
#
# STATUS: implemented — the M2 database track wired the kernels (rust:
# database::* under sheet-fn/src/families/database.rs) + tests
# (sheet-conformance/tests/fn_database.rs::sheet_fn_database_*) and flipped these
# rows to implemented. Family token: `database`. Provenance: ECMA-376 §18.17.7
# (database functions) + public Microsoft function docs.
#
# These are pure: the database + criteria are RANGE arguments materialized by the
# evaluator (range_aware), so no special-form / model reader is needed (unlike
# OFFSET/INDIRECT). Coercion + the criteria-matching machinery is shared across
# all twelve.

- id: sheet.fn.database.dsum
  name: DSUM
  family: database
  arity: { min: 3, max: 3 }
  volatility: none
  range_aware: true
  rust: database::dsum
  status: implemented
  provenance: ["ECMA-376 §18.17.7 (DSUM) — sum of the field over rows matching criteria"]
  tests:
    rust: ["sheet-conformance/tests/fn_database.rs::sheet_fn_database_dsum"]
    corpus: ["corpus/fn-corpus/database/dsum.golden.tsv"]

