# sheet.fn.logical.* (M1 additions) — logical family. Schema: see
# math.yaml. Rust kernels under sheet-fn/src/families/logical2.rs (the M1
# logical track). Provenance: ECMA-376 §18.17.7 + public Microsoft function
# docs. Family token stays `logical` (the M1 rows extend the same family);
# the `2` is only the source-file/track suffix.

- id: sheet.fn.logical.ifs
  name: IFS
  family: logical
  arity: { min: 2, max: null }
  volatility: none
  range_aware: false
  rust: logical2::ifs
  status: implemented
  provenance: ["Microsoft IFS (public docs) — variadic (condition, value) pairs; min one pair; no match -> #N/A; odd arity -> #N/A"]
  tests:
    rust: ["sheet-conformance/tests/fn_logical2.rs::sheet_fn_logical_ifs"]
    corpus: ["corpus/fn-corpus/logical2/ifs.golden.tsv"]

- id: sheet.fn.logical.switch
  name: SWITCH
  family: logical
  arity: { min: 3, max: null }
  volatility: none
  range_aware: false
  rust: logical2::switch
  status: implemented
  provenance: ["Microsoft SWITCH (public docs) — expression, then variadic (value, result) pairs, optional default; cross-type equality via coerce::compare"]
  tests:
    rust: ["sheet-conformance/tests/fn_logical2.rs::sheet_fn_logical_switch"]
    corpus: ["corpus/fn-corpus/logical2/switch.golden.tsv"]

- id: sheet.fn.logical.xor
  name: XOR
  family: logical
  arity: { min: 1, max: null }
  volatility: none
  range_aware: true
  rust: logical2::xor
  status: implemented
  provenance: ["ECMA-376 §18.17.7 (XOR) — variadic logical exclusive-or (TRUE iff an odd count of TRUEs); range-aware like AND/OR"]
  tests:
    rust: ["sheet-conformance/tests/fn_logical2.rs::sheet_fn_logical_xor"]
    corpus: ["corpus/fn-corpus/logical2/xor.golden.tsv"]

- id: sheet.fn.logical.ifna
  name: IFNA
  family: logical
  arity: { min: 2, max: 2 }
  volatility: none
  range_aware: false
  rust: logical2::ifna
  status: implemented
  provenance: ["Microsoft IFNA (public docs) — value, value_if_na; catches ONLY #N/A"]
  tests:
    rust: ["sheet-conformance/tests/fn_logical2.rs::sheet_fn_logical_ifna"]
    corpus: ["corpus/fn-corpus/logical2/ifna.golden.tsv"]
