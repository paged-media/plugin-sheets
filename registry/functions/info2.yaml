# ISFORMULA — left PLANNED (T1 limitation). It must know whether the
# *referenced cell* stores a formula, but a pure fn(&[Arg], &EvalCtx) kernel
# receives only the evaluated value (a `2` is Number(2.0) whether typed or
# computed); neither Arg nor EvalCtx carries a formula-ness flag. Faking it
# from the value is impossible. Stays planned until the calling convention
# grows a reference-introspection seam (additive EvalCtx hook or Arg origin
# flag). Flagged in the track report. Kernel `info2::isformula` is NOT
# written (planned rows are uncallable by construction).
- id: sheet.fn.info.isformula
  name: ISFORMULA
  family: info
  arity: { min: 1, max: 1 }
  volatility: none
  range_aware: true
  ref_args: true
  rust: info2::isformula
  status: planned
  provenance: ["Microsoft ISFORMULA (public docs) — true if the reference is a formula cell. T1: needs reference introspection the pure kernel lacks (see info2.rs module docs)"]
  tests:
    rust: ["sheet-conformance/tests/fn_info2.rs::sheet_fn_info_isformula"]
    corpus: ["corpus/fn-corpus/info2/isformula.golden.tsv"]
