# sheet.fn.info.* (M1 additions) — information family. Schema: see
# math.yaml. Rust kernels under sheet-fn/src/families/info2.rs (the M1
# info track). Provenance: ECMA-376 §18.17.7 + public Microsoft function
# docs. Family token stays `info`; the `2` is only the source-file/track
# suffix.

- id: sheet.fn.info.n
  name: N
  family: info
  arity: { min: 1, max: 1 }
  volatility: none
  range_aware: false
  rust: info2::n
  status: implemented
  provenance: ["ECMA-376 §18.17.7 (N) — number id, TRUE->1, FALSE->0, blank->0, text->0 (does NOT parse numeric text), error propagates"]
  tests:
    rust: ["sheet-conformance/tests/fn_info2.rs::sheet_fn_info_n"]
    corpus: ["corpus/fn-corpus/info2/n.golden.tsv"]

