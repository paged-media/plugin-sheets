# ISFORMULA — EVALUATOR SPECIAL FORM (M2 Phase A, `special_form: true`). It
# must know whether the *referenced cell* stores a formula, which a pure
# fn(&[Arg], &EvalCtx) kernel cannot see (a `2` is Number(2.0) whether typed or
# computed). Rather than add a formula-ness flag to the FROZEN calling
# convention, it is handled in `sheet-calc/eval.rs`: the arg is resolved to a
# CellRef and `cell.formula.is_some()` is read directly from the model. The
# pure dispatch door returns #NAME? for this row (eval intercepts first).
- id: sheet.fn.info.isformula
  name: ISFORMULA
  family: info
  arity: { min: 1, max: 1 }
  volatility: none
  range_aware: true
  ref_args: true
  special_form: true
  status: implemented
  provenance: ["Microsoft ISFORMULA (public docs) — true if the reference is a formula cell. EVALUATOR SPECIAL FORM (M2 Phase A): resolved to a CellRef in sheet-calc/eval.rs; returns Bool(cell.formula.is_some())."]
  tests:
    rust: ["sheet-conformance/tests/special_forms.rs::sheet_fn_info_isformula"]
    corpus: []
