# cargo-deny configuration for paged.sheet.
# Run:  cargo deny check          (CI runs `check licenses bans sources`)
#
# This doubles as the SDK-only rule's Rust half (spec §2.1 / §4 dep
# rule 4): [sources] denies unknown registries/git, so a path/git
# reach-around into core/editor internals — or into another plugin —
# cannot land silently.

[advisories]
version = 2
ignore = []

[licenses]
version = 2
confidence-threshold = 0.9
# Dependencies must be permissively licensed so they can be combined
# into an MPL distribution (same posture as core).
allow = [
    "MPL-2.0",
    # Our own workspace crates: dual MPL-2.0 OR PMEL (SPDX has no id
    # for PMEL, hence the LicenseRef form).
    "LicenseRef-PMEL",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "BSL-1.0",
]
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
